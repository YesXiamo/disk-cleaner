<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac磁盘清理</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <h1>🧹 磁盘清理</h1>
            </div>
            <div class="toolbar-right">
                <div class="disk-info">
                    <span id="disk-usage-text">正在获取磁盘信息...</span>
                    <div class="progress-bar">
                        <div id="disk-progress" class="progress-fill"></div>
                    </div>
                </div>
                <button id="select-folder-btn" class="btn btn-primary">
                    📁 选择目录
                </button>
                <button id="refresh-btn" class="btn btn-secondary">
                    🔄 刷新
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧边栏 - 统计信息 -->
            <div class="sidebar">
                <div class="stat-card">
                    <h3>📊 扫描统计</h3>
                    <div class="stat-item">
                        <span class="stat-label">总文件数</span>
                        <span id="total-files" class="stat-value">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总大小</span>
                        <span id="total-size" class="stat-value">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">文件夹数</span>
                        <span id="total-folders" class="stat-value">-</span>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>🏆 最大文件</h3>
                    <div id="largest-files" class="largest-files-list">
                        <div class="loading">扫描中...</div>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>⚡ 快速操作</h3>
                    <button id="clean-temp-btn" class="btn btn-warning full-width">
                        🗑️ 清理临时文件
                    </button>
                    <button id="clean-cache-btn" class="btn btn-warning full-width" style="margin-top: 8px;">
                        🧹 清理缓存
                    </button>
                </div>
            </div>

            <!-- 右侧主区域 - 热力图 -->
            <div class="heatmap-container">
                <div class="heatmap-header">
                    <h2>📍 磁盘占用热力图</h2>
                    <div class="heatmap-legend">
                        <span>小文件</span>
                        <div class="legend-gradient"></div>
                        <span>大文件</span>
                    </div>
                </div>
                <div id="heatmap" class="heatmap">
                    <div class="loading-overlay">
                        <div class="spinner"></div>
                        <p>正在扫描目录...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="status-bar">
            <span id="status-text">就绪</span>
            <span id="current-path"></span>
        </div>
    </div>

    <!-- 文件详情弹窗 -->
    <div id="file-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">文件详情</h3>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="file-info">
                    <div class="info-row">
                        <span class="info-label">名称:</span>
                        <span id="modal-name" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">路径:</span>
                        <span id="modal-path" class="info-value path-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">大小:</span>
                        <span id="modal-size" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">类型:</span>
                        <span id="modal-type" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">修改时间:</span>
                        <span id="modal-mtime" class="info-value"></span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="delete-btn" class="btn btn-danger">🗑️ 删除</button>
                <button id="close-modal-btn" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
